<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Expense | Student Expense Tracker</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-page="edit-expense">
<header class="topbar">
    <div>
        <p class="eyebrow">Update an existing record</p>
        <h1>Edit Expense</h1>
    </div>
    <div class="topbar-actions">
        <span class="user-pill">Hi, <strong data-current-user>User</strong></span>
        <button id="logoutButton" class="danger-btn" type="button">Logout</button>
        <button id="themeToggle" class="secondary-btn" type="button">Toggle Dark Mode</button>
        <a class="secondary-btn" href="/index.html">Back to Dashboard</a>
    </div>
</header>

<main class="container narrow">
    <section class="card">
        <form id="editExpenseForm" class="stack-form">
            <label>
                Amount
                <input type="number" id="amount" min="0.01" step="0.01" required>
            </label>
            <label>
                Category
                <select id="category" required>
                    <option value="">Select a category</option>
                    <option value="FOOD">Food</option>
                    <option value="TRAVEL">Travel</option>
                    <option value="BOOKS">Books</option>
                    <option value="OTHERS">Others</option>
                </select>
            </label>
            <label>
                Date
                <input type="date" id="date" required>
            </label>
            <label>
                Description
                <textarea id="description" rows="4" maxlength="255" required></textarea>
            </label>
            <div class="form-actions">
                <button class="primary-btn" type="submit">Update Expense</button>
                <a class="secondary-btn" href="/index.html">Cancel</a>
            </div>
        </form>
        <div id="formMessage" class="form-message"></div>
    </section>
</main>

<script src="/js/common.js"></script>
<script src="/js/edit-expense.js"></script>
</body>
</html>
